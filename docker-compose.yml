services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mia
      POSTGRES_PASSWORD: mia_password
      POSTGRES_DB: mia_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mia -d mia_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
